services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c idle_in_transaction_session_timeout=30000
      -c statement_timeout=60000
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=6
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./volumes/prometheus:/prometheus
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - ./volumes/grafana:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus

  # ── Application Services ──────────────────────────────────────────────────────
  gateway-service:
    image: ${DOCKER_USERNAME:-launchpad}/gateway-service:${TAG:-latest}
    build:
      context: ../../gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    restart: unless-stopped
    env_file: ../../gateway-service/.env
    ports:
      - "8000:8000"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    image: ${DOCKER_USERNAME:-launchpad}/auth-service:${TAG:-latest}
    build:
      context: ../../identity-services
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file: ../../identity-services/services/auth-service/.env
    ports:
      - "3001:3001"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    image: ${DOCKER_USERNAME:-launchpad}/user-service:${TAG:-latest}
    build:
      context: ../../identity-services
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    restart: unless-stopped
    env_file: ../../identity-services/services/user-service/.env
    ports:
      - "3002:3002"
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    image: ${DOCKER_USERNAME:-launchpad}/notification-service:${TAG:-latest}
    build:
      context: ../../identity-services
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    env_file: ../../identity-services/services/notification-service/.env
    ports:
      - "3003:3003"
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  payment-service:
    image: ${DOCKER_USERNAME:-launchpad}/payment-service:${TAG:-latest}
    build:
      context: ../../
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    restart: unless-stopped
    env_file: ../../payment-service/.env
    ports:
      - "8004:8004"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  application-service:
    image: ${DOCKER_USERNAME:-launchpad}/application-service:${TAG:-latest}
    build:
      context: ../../
      dockerfile: deployment-services/application-service/Dockerfile
    container_name: application-service
    restart: unless-stopped
    env_file: ../../deployment-services/application-service/.env
    ports:
      - "8002:8002"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  application-worker:
    image: ${DOCKER_USERNAME:-launchpad}/application-worker:${TAG:-latest}
    build:
      context: ../../
      dockerfile: deployment-services/application-service/Dockerfile.worker
    container_name: application-worker
    restart: unless-stopped
    env_file: ../../deployment-services/application-service/.env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  infrastructure-service:
    image: ${DOCKER_USERNAME:-launchpad}/infrastructure-service:${TAG:-latest}
    build:
      context: ../../
      dockerfile: deployment-services/infrastructure-service/Dockerfile
    container_name: infrastructure-service
    restart: unless-stopped
    env_file: ../../deployment-services/infrastructure-service/.env
    ports:
      - "8003:8003"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  infrastructure-worker:
    image: ${DOCKER_USERNAME:-launchpad}/infrastructure-worker:${TAG:-latest}
    build:
      context: ../../
      dockerfile: deployment-services/infrastructure-service/Dockerfile.worker
    container_name: infrastructure-worker
    restart: unless-stopped
    env_file: ../../deployment-services/infrastructure-service/.env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    image: ${DOCKER_USERNAME:-launchpad}/frontend:${TAG:-latest}
    build:
      context: ../../launchpad-frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - backend

networks:
  backend:
    driver: bridge
