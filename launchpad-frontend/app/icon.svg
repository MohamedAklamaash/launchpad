<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- bg rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- hex ring -->
  <path d="M16 4 L24 8.5 L24 17.5 L16 22 L8 17.5 L8 8.5 Z"
        stroke="rgba(255,255,255,0.25)" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
  <!-- rocket body -->
  <path d="M16 8 C16 8 12.5 12.5 12.5 16.5 C12.5 18.5 14 20 16 20 C18 20 19.5 18.5 19.5 16.5 C19.5 12.5 16 8 16 8 Z"
        fill="url(#body)"/>
  <!-- fins -->
  <path d="M12.5 16.5 L10.5 19 L12.5 18.2" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M19.5 16.5 L21.5 19 L19.5 18.2" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round" fill="none"/>
  <!-- flame -->
  <path d="M14.5 20 C14.5 20 15.2 23 16 23.5 C16.8 23 17.5 20 17.5 20"
        stroke="url(#flame)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <!-- window -->
  <circle cx="16" cy="15" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="16" cy="15" r="0.9" fill="#7c3aed" opacity="0.7"/>
</svg>
