name: Publish Docker Images

on:
  push:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/launchpad

jobs:
  docker:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-service
            context: gateway-service
            dockerfile: gateway-service/Dockerfile

          - service: auth-service
            context: identity-services
            dockerfile: identity-services/services/auth-service/Dockerfile

          - service: user-service
            context: identity-services
            dockerfile: identity-services/services/user-service/Dockerfile

          - service: notification-service
            context: identity-services
            dockerfile: identity-services/services/notification-service/Dockerfile

          - service: payment-service
            context: .
            dockerfile: payment-service/Dockerfile

          - service: application-service
            context: .
            dockerfile: deployment-services/application-service/Dockerfile

          - service: application-worker
            context: .
            dockerfile: deployment-services/application-service/Dockerfile.worker

          - service: infrastructure-service
            context: .
            dockerfile: deployment-services/infrastructure-service/Dockerfile

          - service: infrastructure-worker
            context: .
            dockerfile: deployment-services/infrastructure-service/Dockerfile.worker

          - service: frontend
            context: launchpad-frontend
            dockerfile: launchpad-frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
