name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-identity:
    name: Lint & Typecheck (identity-services)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: identity-services
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: identity-services/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: identity-services/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm format

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm -r --workspace-root=false exec tsc --noEmit

  check-frontend:
    name: Lint & Typecheck (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launchpad-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: launchpad-frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: npx tsc --noEmit
