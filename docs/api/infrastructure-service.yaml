openapi: 3.0.3
info:
  title: Launchpad Infrastructure Service API
  description: |
    Infrastructure management service for Launchpad platform.
    Handles infrastructure provisioning, updates, and deletion.
  version: 1.0.0
  contact:
    name: Mohamed Aklamaash
    email: support@launchpad.dev

servers:
  - url: http://localhost:8002/api
    description: Local development
  - url: https://api.launchpad.dev/infrastructures
    description: Production

tags:
  - name: Infrastructure
    description: Infrastructure management operations
  - name: Health
    description: Health check endpoints

paths:
  /infrastructures/:
    get:
      tags:
        - Infrastructure
      summary: List user infrastructures
      description: Get all infrastructures owned by or shared with the authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of infrastructures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Infrastructure'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Infrastructure
      summary: Create infrastructure
      description: Create new infrastructure and start provisioning
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfrastructureCreate'
      responses:
        '201':
          description: Infrastructure created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Infrastructure'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /infrastructures/{infra_id}/:
    get:
      tags:
        - Infrastructure
      summary: Get infrastructure details
      description: Get detailed information about a specific infrastructure
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InfraId'
      responses:
        '200':
          description: Infrastructure details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfrastructureDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Infrastructure
      summary: Delete infrastructure
      description: Delete infrastructure (SUPER_ADMIN only, no apps must exist)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InfraId'
      responses:
        '204':
          description: Infrastructure deleted successfully
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Cannot delete - applications exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Cannot delete infrastructure. 2 application(s) still exist."

  /infrastructures/{infra_id}/update/:
    patch:
      tags:
        - Infrastructure
      summary: Update infrastructure
      description: Update infrastructure configuration (SUPER_ADMIN only)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InfraId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfrastructureUpdate'
      responses:
        '200':
          description: Infrastructure updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Infrastructure'
        '403':
          $ref: '#/components/responses/Forbidden'

  /healthz/:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if service is healthy
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /liveness/:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Kubernetes liveness probe
      responses:
        '200':
          description: Service is alive

  /readiness/:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Kubernetes readiness probe
      responses:
        '200':
          description: Service is ready

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    InfraId:
      name: infra_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Infrastructure UUID

  schemas:
    InfrastructureCreate:
      type: object
      required:
        - name
        - cloud_provider
        - max_cpu
        - max_memory
        - code
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
          description: Infrastructure name (unique per user)
          example: production
        cloud_provider:
          type: string
          enum: [AWS]
          description: Cloud provider
          example: AWS
        max_cpu:
          type: number
          format: float
          minimum: 0.25
          description: Maximum CPU in vCPU
          example: 4.0
        max_memory:
          type: number
          format: float
          minimum: 0.5
          description: Maximum memory in GB
          example: 8.0
        code:
          type: string
          description: AWS Account ID
          example: "123456789012"

    InfrastructureUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
          example: production-v2
        max_cpu:
          type: number
          format: float
          minimum: 0.25
          example: 8.0
        max_memory:
          type: number
          format: float
          minimum: 0.5
          example: 16.0

    Infrastructure:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        user_id:
          type: string
          format: uuid
        cloud_provider:
          type: string
          enum: [AWS]
        max_cpu:
          type: number
          format: float
        max_memory:
          type: number
          format: float
        is_cloud_authenticated:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InfrastructureDetail:
      allOf:
        - $ref: '#/components/schemas/Infrastructure'
        - type: object
          properties:
            metadata:
              type: object
              properties:
                vpc_id:
                  type: string
                cluster_arn:
                  type: string
                alb_arn:
                  type: string
                alb_dns:
                  type: string
                ecr_repository_url:
                  type: string
            environment:
              type: object
              properties:
                status:
                  type: string
                  enum: [PENDING, PROVISIONING, ACTIVE, ERROR, DESTROYING, DESTROYED]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Infrastructure with name 'production' already exists"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Authentication required"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Only the infrastructure owner can update it"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Infrastructure not found"
