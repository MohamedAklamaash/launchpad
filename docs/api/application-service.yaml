openapi: 3.0.3
info:
  title: Launchpad Application Service API
  description: |
    Application deployment and management service for Launchpad platform.
    Handles application creation, deployment, updates, and lifecycle management.
  version: 1.0.0
  contact:
    name: Mohamed Aklamaash
    email: support@launchpad.dev

servers:
  - url: http://localhost:8001/api
    description: Local development
  - url: https://api.launchpad.dev/applications
    description: Production

tags:
  - name: Applications
    description: Application management operations
  - name: Deployment
    description: Deployment operations
  - name: Lifecycle
    description: Application lifecycle (sleep/wake)
  - name: Validation
    description: Validation endpoints
  - name: Health
    description: Health check endpoints

paths:
  /applications/:
    get:
      tags:
        - Applications
      summary: List applications
      description: Get all applications for a specific infrastructure
      security:
        - BearerAuth: []
      parameters:
        - name: infrastructure_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Infrastructure UUID
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationSummary'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      tags:
        - Applications
      summary: Create application
      description: Create new application (SUPER_ADMIN or ADMIN role required)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
      responses:
        '201':
          description: Application created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'

  /applications/{app_id}/:
    get:
      tags:
        - Applications
      summary: Get application details
      description: Get detailed information about a specific application
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: Application details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Applications
      summary: Delete application
      description: Delete application and cleanup AWS resources (SUPER_ADMIN or ADMIN)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '204':
          description: Application deleted successfully
        '403':
          $ref: '#/components/responses/Forbidden'

  /applications/{app_id}/update/:
    patch:
      tags:
        - Applications
      summary: Update application
      description: Update application configuration (SUPER_ADMIN or ADMIN)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdate'
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetail'
        '403':
          $ref: '#/components/responses/Forbidden'

  /applications/{app_id}/deploy/:
    post:
      tags:
        - Deployment
      summary: Deploy/Re-deploy application
      description: Deploy or re-deploy application (pulls latest code from GitHub)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '202':
          description: Deployment queued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deployment queued successfully"
                  application_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: "QUEUED"
        '400':
          $ref: '#/components/responses/BadRequest'

  /applications/{app_id}/retry/:
    post:
      tags:
        - Deployment
      summary: Retry failed deployment
      description: Cleanup and retry a failed deployment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '202':
          description: Retry queued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deployment retry queued successfully"
                  application_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: "QUEUED"

  /applications/{app_id}/sleep/:
    post:
      tags:
        - Lifecycle
      summary: Sleep application
      description: Put application to sleep (scale to 0 tasks) for cost saving
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: Application put to sleep successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Application put to sleep successfully"
                  application_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: "SLEEPING"
        '400':
          description: Cannot sleep application
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Cannot sleep application in DEPLOYING state"

  /applications/{app_id}/wake/:
    post:
      tags:
        - Lifecycle
      summary: Wake application
      description: Wake application from sleep (restore desired task count)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: Application woken up successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Application woken up successfully"
                  application_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: "ACTIVE"

  /infrastructures/{infra_id}/validation/:
    get:
      tags:
        - Validation
      summary: Validate infrastructure deletion
      description: Check if infrastructure can be deleted (no applications exist)
      security:
        - BearerAuth: []
      parameters:
        - name: infra_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  can_delete:
                    type: boolean
                  app_count:
                    type: integer
                  error_message:
                    type: string
                    nullable: true
              examples:
                can_delete:
                  value:
                    can_delete: true
                    app_count: 0
                    error_message: null
                cannot_delete:
                  value:
                    can_delete: false
                    app_count: 2
                    error_message: "Cannot delete infrastructure. 2 application(s) still exist. Delete all applications first."

  /healthz/:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /liveness/:
    get:
      tags:
        - Health
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive

  /readiness/:
    get:
      tags:
        - Health
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready

  /metrics/:
    get:
      tags:
        - Health
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics in Prometheus format

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AppId:
      name: app_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Application UUID

  schemas:
    ApplicationCreate:
      type: object
      required:
        - infrastructure_id
        - name
        - project_remote_url
        - project_branch
        - alloted_cpu
        - alloted_memory
      properties:
        infrastructure_id:
          type: string
          format: uuid
        name:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          minLength: 3
          maxLength: 63
          description: DNS-compatible name (unique per user)
          example: my-app
        description:
          type: string
          maxLength: 500
        project_remote_url:
          type: string
          format: uri
          description: GitHub repository URL
          example: https://github.com/user/repo
        project_branch:
          type: string
          default: main
          example: main
        project_commit_hash:
          type: string
          maxLength: 40
        dockerfile_path:
          type: string
          default: Dockerfile
          example: Dockerfile
        port:
          type: integer
          minimum: 1024
          maximum: 65535
          default: 8080
        alloted_cpu:
          type: number
          format: float
          enum: [0.25, 0.5, 1.0, 2.0, 4.0]
          description: CPU in vCPU
          example: 0.5
        alloted_memory:
          type: number
          format: float
          description: Memory in GB (must match CPU)
          example: 1.0
        alloted_storage:
          type: number
          format: float
          default: 0.0
        envs:
          type: object
          additionalProperties:
            type: string
          description: Environment variables
          example:
            NODE_ENV: production
            DATABASE_URL: postgres://...

    ApplicationUpdate:
      type: object
      properties:
        description:
          type: string
          maxLength: 500
        envs:
          type: object
          additionalProperties:
            type: string
        port:
          type: integer
          minimum: 1024
          maximum: 65535
        alloted_cpu:
          type: number
          format: float
          enum: [0.25, 0.5, 1.0, 2.0, 4.0]
        alloted_memory:
          type: number
          format: float

    ApplicationSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cpu:
          type: number
          format: float
        memory:
          type: number
          format: float
        port:
          type: integer

    ApplicationDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [CREATED, BUILDING, PUSHING_IMAGE, DEPLOYING, ACTIVE, SLEEPING, FAILED]
        is_sleeping:
          type: boolean
        cpu:
          type: number
          format: float
        memory:
          type: number
          format: float
        storage:
          type: number
          format: float
        port:
          type: integer
        url:
          type: string
          description: GitHub repository URL
        branch:
          type: string
        dockerfile_path:
          type: string
        envs:
          type: object
          additionalProperties:
            type: string
        deployment_url:
          type: string
          description: Public URL to access the application
          example: http://infra-019ccc43-alb-123.us-west-2.elb.amazonaws.com/my-app
        build_id:
          type: string
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Authentication required"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "You don't have permission to create applications. Required role: SUPER_ADMIN or ADMIN"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Application not found"
